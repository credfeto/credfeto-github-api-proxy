services:
  proxy:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PROXY_TOKEN=${PROXY_TOKEN}
      - GITHUB_PAT=${GITHUB_PAT}
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test:
        - "/nodejs/bin/node"
        - "-e"
        - "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
