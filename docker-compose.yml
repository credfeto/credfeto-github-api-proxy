services:
  proxy:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      # Option A: credentials file (recommended for multiple agents)
      # Uncomment and set the path inside the container, then add the volume mount below.
      # - CREDENTIALS_FILE=/app/credentials.json
      #
      # Option B: single pair via environment variables (backward-compatible)
      - PROXY_TOKEN=${PROXY_TOKEN}
      - GITHUB_PAT=${GITHUB_PAT}
    # volumes:
    #   - ./credentials.json:/app/credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test:
        - "/nodejs/bin/node"
        - "-e"
        - "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
