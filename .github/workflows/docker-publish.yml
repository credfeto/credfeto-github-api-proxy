name: "Docker: Build and Push"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3.10.0

      - name: "Build and push"
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: |
            docker-registry.markridgwell.com/credfeto/github-api-proxy:latest
            docker-registry.markridgwell.com/credfeto/github-api-proxy:${{github.sha}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
